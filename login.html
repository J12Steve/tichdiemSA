<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Playground — Đăng nhập</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.10);
            --glass-shadow: 0 24px 80px rgba(0,0,0,0.6);

            --text: #f2f2f7;
            --text2: #aeaeb2;
            --text3: #48484a;

            --accent: #7d7aff;
            --accent2: #da8fff;
            --accent-rgb: 125,122,255;

            --red: #ff453a;
            --green: #32d74b;

            --blur: blur(40px) saturate(1.8);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(125,122,255,0.25) 0%, transparent 55%),
                radial-gradient(ellipse 70% 60% at 80% 80%, rgba(218,143,255,0.20) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,70,255,0.06) 0%, transparent 70%);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        }

        #stage {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(125,122,255,0.10);
            pointer-events: none;
            animation: ring-pulse 6s ease-in-out infinite;
        }

        .ring-1 { width: 320px; height: 320px; animation-delay: 0s; }
        .ring-2 { width: 480px; height: 480px; animation-delay: 1.5s; }
        .ring-3 { width: 640px; height: 640px; animation-delay: 3s; }

        @keyframes ring-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        #centerWrap {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #logo {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            user-select: none;
            transition: all 0.8s cubic-bezier(0.34,1.2,0.64,1);
        }

        #logoImg {
            width: 400px;
            height: 350px;
            object-fit: contain;
            filter: drop-shadow(0 0 32px rgba(125,122,255,0.6)) drop-shadow(0 0 12px rgba(218,143,255,0.4));
            animation: logo-float 3.5s ease-in-out infinite;
            transition: all 0.7s cubic-bezier(0.34,1.2,0.64,1);
        }

        @keyframes logo-float {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-14px) rotate(1deg); }
        }

        .logo-wordmark {
            text-align: center;
            transition: opacity 0.4s, transform 0.5s;
        }

        .logo-wordmark h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 30%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-wordmark span {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.8;
        }

        .tap-hint {
            position: absolute;
            bottom: -44px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text3);
            white-space: nowrap;
            animation: blink 2s ease-in-out infinite;
            transition: opacity 0.4s;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #logo.revealed {
            transform: translateY(-128px) scale(0.62);
            pointer-events: none;
        }

        #logo.revealed #logoImg {
            animation: none;
            filter: drop-shadow(0 0 20px rgba(125,122,255,0.4));
        }

        #logo.revealed .logo-wordmark {
            opacity: 0;
            transform: translateY(8px);
        }

        #logo.revealed .tap-hint {
            opacity: 0;
        }

        #formCard {
            position: absolute;
            width: 100%;
            padding: 36px 32px 28px;
            border-radius: 28px;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            gap: 18px;

            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--glass-shadow), 0 0 0 1px rgba(255,255,255,0.04) inset;

            opacity: 0;
            transform: scale(0.7) translateY(40px);
            pointer-events: none;

            transition:
                opacity 0.6s cubic-bezier(0.22,1,0.36,1),
                transform 0.7s cubic-bezier(0.34,1.12,0.64,1);
        }

        #formCard::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        }

        #formCard.visible {
            opacity: 1;
            transform: scale(1) translateY(52px);
            pointer-events: all;
        }

        .form-title {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text2);
            padding-bottom: 2px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .field label {
            padding-left: 2px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text3);
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text3);
            pointer-events: none;
            transition: color 0.2s;
        }

        .field input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            outline: none;

            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);

            caret-color: var(--accent);
            transition: all 0.25s;
        }

        .field input::placeholder {
            color: var(--text3);
        }

        .field input:focus {
            border-color: rgba(var(--accent-rgb), 0.5);
            box-shadow:
                0 0 0 3px rgba(var(--accent-rgb), 0.12),
                0 0 0 1px rgba(var(--accent-rgb), 0.08) inset;
            background: rgba(255,255,255,0.07);
        }

        .field input:focus ~ .input-icon {
            color: var(--accent);
        }

        .field input.error {
            border-color: rgba(255,69,58,0.6);
            box-shadow: 0 0 0 3px rgba(255,69,58,0.12);
        }

        /* PASSWORD FIX */
        .password-wrap input {
            padding-right: 46px;
        }

        .eye-btn {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);

            width: 20px;
            height: 20px;
            padding: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;

            color: var(--text3);
            z-index: 2;
            transition: color 0.2s ease;
        }

        .eye-btn:hover {
            color: var(--text2);
        }

        .eye-btn svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        #loginBtn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;

            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #fff;

            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.45);
            transition: all 0.22s;
        }

        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(var(--accent-rgb), 0.55);
        }

        #loginBtn:active {
            transform: scale(0.97);
        }

        #loginBtn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        #loginBtn:hover::after {
            left: 150%;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            width: 300px;
            padding: 32px 28px 24px;
            text-align: center;
            border-radius: 24px;

            background: rgba(28,28,32,0.96);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);

            transform: scale(0.85) translateY(16px);
            transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
        }

        .modal-overlay.visible .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-icon.red {
            background: rgba(255,69,58,0.15);
        }

        .modal-icon svg {
            width: 24px;
            height: 24px;
        }

        .modal-icon.red svg {
            color: var(--red);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .modal-desc {
            font-size: 12px;
            font-weight: 400;
            color: var(--text2);
            line-height: 1.65;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .modal-close {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.06);

            font-family: 'Kanit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text2);
            transition: all 0.18s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.10);
            color: var(--text);
        }

        #toast {
            position: fixed;
            right: 32px;
            bottom: 32px;
            z-index: 300;

            width: 260px;
            padding: 16px 20px 0;
            overflow: hidden;
            border-radius: 18px;

            display: flex;
            flex-direction: column;
            gap: 10px;

            background: rgba(18,18,22,0.95);
            border: 1px solid rgba(50,215,75,0.3);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(50,215,75,0.08) inset;

            transform: translateX(calc(100% + 40px)) scale(0.9);
            opacity: 0;
            transition:
                transform 0.5s cubic-bezier(0.34,1.18,0.64,1),
                opacity 0.4s;
        }

        #toast.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }

        .toast-body {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 14px;
        }

        .toast-ico {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 10px;
            background: rgba(50,215,75,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-ico svg {
            width: 18px;
            height: 18px;
            color: var(--green);
        }

        .toast-text h4 {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .toast-text p {
            margin-top: 3px;
            font-size: 11px;
            font-weight: 400;
            color: var(--text2);
            line-height: 1.5;
        }

        .toast-bar {
            height: 3px;
            margin: 0 -20px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            border-radius: 0 0 18px 18px;
        }

        .toast-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--green), #30d158);
            transform-origin: left;
            animation: toast-progress 2s linear forwards;
        }
        /* ── THEME TOGGLE ───────────────────────── */
#themeToggle {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    z-index: 20;
}

#themeToggle:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
}

#themeToggle svg {
    width: 18px;
    height: 18px;
}

body.light {
    --bg: #f6f7fb;
    --glass: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.55);
    --glass-shadow: 0 24px 80px rgba(80,80,120,0.18);

    --text: #111114;
    --text2: #5f6472;
    --text3: #9a9dad;

    --accent: #6d5dfc;
    --accent2: #b86cff;
    --accent-rgb: 109,93,252;

    --blur: blur(34px) saturate(1.6);
}
        @keyframes toast-progress {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        @media (max-width: 440px) {
            #centerWrap {
                width: 320px;
                height: 320px;
            }

            #formCard {
                padding: 28px 20px 20px;
            }
        }
    </style>
</head>
<body>

<div id="stage">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div id="centerWrap" onclick="revealForm()">
        <div id="logo">
            <img id="logoImg" src="img/logo-removed1.png" alt="Playground logo"
                 onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex'">

            <div id="logoFallback" style="display:none;width:110px;height:110px;border-radius:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));align-items:center;justify-content:center;font-size:44px;filter:drop-shadow(0 0 24px rgba(125,122,255,0.7));">
                🎪
            </div>

            <div class="logo-wordmark">
                <h1>PLAYGROUND</h1>
                <span>Premium Loyalty</span>
            </div>

            <div class="tap-hint">Nhấn để tiếp tục</div>
        </div>

        <div id="formCard" onclick="event.stopPropagation()">
            <div class="form-title">Đăng nhập hệ thống</div>
            <button id="themeToggle" type="button" onclick="toggleTheme()" aria-label="Đổi giao diện">
    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3c0 0 0 0 0 0A7 7 0 0 0 21 12.79z"/>
    </svg>
</button>
            <div class="field">
                <label>Tên đăng nhập</label>
                <div class="input-wrap">
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="username">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <div class="field">
                <label>Mật khẩu</label>
                <div class="input-wrap password-wrap">
                    <input type="password" id="password" placeholder="Mật khẩu" autocomplete="current-password">

                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                        <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
                    </svg>

                    <button class="eye-btn" type="button" id="eyeBtn" onclick="togglePwd()" tabindex="-1">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button id="loginBtn" onclick="doLogin()">Đăng nhập</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="errModal">
    <div class="modal-box">
        <div class="modal-icon red">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <div class="modal-title" id="errTitle">Lỗi đăng nhập</div>
        <p class="modal-desc" id="errDesc">Nội dung lỗi</p>
        <button class="modal-close" onclick="closeErr()">Đã hiểu</button>
    </div>
</div>

<div id="toast">
    <div class="toast-body">
        <div class="toast-ico">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="toast-text">
            <h4>Đăng nhập thành công!</h4>
            <p>Chào mừng trở lại,<br>đang chuyển hướng…</p>
        </div>
    </div>
    <div class="toast-bar">
        <div class="toast-bar-fill" id="toastFill"></div>
    </div>
</div>

<script>
    let formRevealed = false;

    function revealForm() {
        if (formRevealed) return;
        formRevealed = true;

        document.getElementById('centerWrap').style.cursor = 'default';
        document.getElementById('logo').classList.add('revealed');

        setTimeout(() => {
            document.getElementById('formCard').classList.add('visible');
            setTimeout(() => document.getElementById('username').focus(), 350);
        }, 180);
    }

    function togglePwd() {
        const inp = document.getElementById('password');
        const ico = document.getElementById('eyeIcon');

        if (inp.type === 'password') {
            inp.type = 'text';
            ico.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            inp.type = 'password';
            ico.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    }

    function doLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const uInp = document.getElementById('username');
        const pInp = document.getElementById('password');

        uInp.classList.remove('error');
        pInp.classList.remove('error');

        if (!user && !pass) {
            uInp.classList.add('error');
            pInp.classList.add('error');
            showErr('Thiếu thông tin', 'Vui lòng nhập tên đăng nhập và mật khẩu để tiếp tục.');
            return;
        }

        if (user !== 'admin' && pass === '123456') {
            uInp.classList.add('error');
            showErr('Tên đăng nhập sai', `"${user || '(trống)'}" không tồn tại trong hệ thống.\nVui lòng kiểm tra lại.`);
            return;
        }

        if (user === 'admin' && pass !== '123456') {
            pInp.classList.add('error');
            showErr('Mật khẩu không đúng', 'Mật khẩu bạn nhập không khớp.\nVui lòng thử lại.');
            return;
        }

        if (user !== 'admin' || pass !== '123456') {
            uInp.classList.add('error');
            pInp.classList.add('error');
            showErr('Thông tin không hợp lệ', 'Tên đăng nhập hoặc mật khẩu không đúng.\nVui lòng kiểm tra lại.');
            return;
        }

        showSuccess();
    }

    function showErr(title, desc) {
        document.getElementById('errTitle').textContent = title;
        document.getElementById('errDesc').textContent = desc;
        document.getElementById('errModal').classList.add('visible');
    }

    function closeErr() {
        document.getElementById('errModal').classList.remove('visible');
    }

    function showSuccess() {
        const toast = document.getElementById('toast');
        const fill = document.getElementById('toastFill');

        fill.style.animation = 'none';
        fill.offsetHeight;
        fill.style.animation = '';

        toast.classList.add('show');

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2400);
    }

    document.getElementById('errModal').addEventListener('click', function(e) {
        if (e.target === this) closeErr();
    });

    function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');

    body.classList.toggle('light');

    const isLight = body.classList.contains('light');
    localStorage.setItem('pg-theme', isLight ? 'light' : 'dark');

    icon.innerHTML = isLight
        ? `<circle cx="12" cy="12" r="4"></circle>
           <path d="M12 2v2"></path>
           <path d="M12 20v2"></path>
           <path d="M4.93 4.93l1.41 1.41"></path>
           <path d="M17.66 17.66l1.41 1.41"></path>
           <path d="M2 12h2"></path>
           <path d="M20 12h2"></path>
           <path d="M4.93 19.07l1.41-1.41"></path>
           <path d="M17.66 6.34l1.41-1.41"></path>`
        : `<path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"/>`;
}

function loadTheme() {
    const saved = localStorage.getItem('pg-theme');
    const body = document.body;
    const icon = document.getElementById('themeIcon');

    if (saved === 'light') {
        body.classList.add('light');
        icon.innerHTML = `
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="M4.93 4.93l1.41 1.41"></path>
            <path d="M17.66 17.66l1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="M4.93 19.07l1.41-1.41"></path>
            <path d="M17.66 6.34l1.41-1.41"></path>
        `;
    }
}
loadTheme();
</script>
