<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập · Song Anh Kids Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

[data-theme="dark"]{
  --bg:#08080f;
  --bg-panel:rgba(15,15,26,0.88);
  --bg-field:rgba(255,255,255,0.05);
  --bg-field-focus:rgba(255,255,255,0.08);
  --gb:rgba(255,255,255,0.10);
  --gb-focus:rgba(125,122,255,0.45);
  --text:#f2f2f7;
  --text2:#aeaeb2;
  --text3:#48484f;
  --accent:#7d7aff;
  --accent2:#da8fff;
  --accent-rgb:125,122,255;
  --red:#ff453a;
  --green:#30d158;
  --orb1:rgba(125,122,255,0.45);
  --orb2:rgba(218,143,255,0.35);
  --orb3:rgba(0,200,255,0.20);
  --grid:rgba(125,122,255,0.04);
  --ring-bg:#08080f;
  --panel-shine:rgba(255,255,255,0.07);
  --panel-line:rgba(125,122,255,0.55);
  --modal-bg:rgba(18,18,30,0.96);
  --toggle-bg:rgba(15,15,26,0.85);
}
[data-theme="light"]{
  --bg:#ececf4;
  --bg-panel:rgba(255,255,255,0.78);
  --bg-field:rgba(0,0,0,0.04);
  --bg-field-focus:rgba(0,0,0,0.065);
  --gb:rgba(0,0,0,0.09);
  --gb-focus:rgba(88,86,214,0.42);
  --text:#1c1c1e;
  --text2:#6e6e73;
  --text3:#c0c0c8;
  --accent:#5856d6;
  --accent2:#af52de;
  --accent-rgb:88,86,214;
  --red:#ff3b30;
  --green:#34c759;
  --orb1:rgba(88,86,214,0.20);
  --orb2:rgba(175,82,222,0.16);
  --orb3:rgba(0,122,255,0.10);
  --grid:rgba(88,86,214,0.055);
  --ring-bg:#ececf4;
  --panel-shine:rgba(255,255,255,0.92);
  --panel-line:rgba(88,86,214,0.30);
  --modal-bg:rgba(252,252,255,0.97);
  --toggle-bg:rgba(255,255,255,0.75);
}

html,body{height:100%;overflow:hidden}
body{
  font-family:"Kanit",-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  position:relative;display:flex;align-items:center;justify-content:center;
  transition:background .4s,color .4s;
}

/* BG */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orb-drift 18s ease-in-out infinite}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,var(--orb1),transparent 70%);opacity:.9;top:-200px;left:-150px}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,var(--orb2),transparent 70%);opacity:.9;bottom:-150px;right:-100px;animation-delay:-6s}
.orb-3{width:400px;height:400px;background:radial-gradient(circle,var(--orb3),transparent 70%);opacity:.9;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-12s}
@keyframes orb-drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.08)}66%{transform:translate(-20px,30px) scale(.95)}}
.grid-lines{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:60px 60px;
}

/* THEME BTN */
#themeBtn{
  position:fixed;top:18px;right:18px;z-index:50;
  width:42px;height:42px;border-radius:50%;
  background:var(--toggle-bg);border:1px solid var(--gb);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);box-shadow:0 4px 16px rgba(0,0,0,.15);
  transition:all .25s;
}
#themeBtn:hover{transform:scale(1.09);color:var(--accent);border-color:rgba(var(--accent-rgb),.4)}
#themeBtn:active{transform:scale(.93)}
#themeBtn svg{width:18px;height:18px;transition:transform .4s cubic-bezier(.34,1.4,.64,1)}
#themeBtn:hover svg{transform:rotate(22deg)}

/* SCENE */
#loginScene{
  position:relative;z-index:1;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

/* LOGO STAGE */
#logoStage{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  cursor:pointer;user-select:none;
  animation:logo-rise .9s cubic-bezier(.34,1.2,.64,1) both;
}
#logoStage:hover .logo-ring{transform:scale(1.06)}
#logoStage:active .logo-ring{transform:scale(.97)}

.logo-ring{
  position:relative;width:130px;height:130px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .35s cubic-bezier(.34,1.4,.64,1);
}
.logo-ring::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),var(--accent2),#00c2ff,var(--accent));
  animation:spin-ring 6s linear infinite;opacity:.82;
}
.logo-ring::after{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:var(--ring-bg);transition:background .4s;
}
@keyframes spin-ring{to{transform:rotate(360deg)}}

.logo-img-box{
  position:relative;z-index:1;
  width:100px;height:100px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.logo-img-box img{
  width:88%;height:88%;object-fit:contain;display:block;
}
.logo-fallback{
  display:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:30px;font-weight:900;letter-spacing:-1px;
}

.logo-text{text-align:center}
.logo-text h1{font-size:22px;font-weight:800;letter-spacing:-.04em;color:var(--text);line-height:1.15;transition:color .4s}
.logo-text p{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-top:5px}

.tap-hint{
  font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
  animation:logo-rise .9s .3s cubic-bezier(.34,1.2,.64,1) both,pulse-hint 2.5s 1.2s ease-in-out infinite;
  transition:color .4s;
}
.tap-hint::before,.tap-hint::after{content:'';display:block;width:24px;height:1px;background:linear-gradient(90deg,transparent,var(--text3))}
.tap-hint::after{transform:scaleX(-1)}
@keyframes pulse-hint{0%,100%{opacity:.45}50%{opacity:1}}

/* FORM PANEL */
#formPanel{
  position:absolute;width:388px;
  background:var(--bg-panel);
  border:1px solid var(--gb);border-radius:28px;
  padding:34px 30px 26px;
  backdrop-filter:blur(48px) saturate(1.9);-webkit-backdrop-filter:blur(48px) saturate(1.9);
  box-shadow:0 32px 80px rgba(0,0,0,.32),0 1px 0 var(--panel-shine) inset;
  opacity:0;transform:translateY(40px) scale(.92);pointer-events:none;
  transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.34,1.2,.64,1),background .4s,border-color .4s;
}
#formPanel.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
#formPanel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:28px 28px 0 0;
  background:linear-gradient(90deg,transparent,var(--panel-line),transparent);
}

.panel-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.panel-logo-box{
  width:46px;height:46px;border-radius:14px;
  border:1px solid var(--gb);background:var(--bg-field);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;transition:background .4s,border-color .4s;
}
.panel-logo-box img{width:78%;height:78%;object-fit:contain}
.panel-logo-box .plf{
  display:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:900;font-size:14px;
}
.panel-head-txt h2{font-size:16px;font-weight:800;letter-spacing:-.03em;color:var(--text);line-height:1;transition:color .4s}
.panel-head-txt p{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-top:3px}

/* FIELDS */
.field{margin-bottom:14px}
.flabel{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:7px;padding-left:2px;transition:color .4s}
.fwrap{position:relative}
.fico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;transition:color .2s;
}
.fico svg{width:16px;height:16px;display:block}
.fwrap:focus-within .fico{color:var(--accent)}

.fi{
  width:100%;padding:14px 16px 14px 44px;border-radius:14px;
  background:var(--bg-field);border:1.5px solid var(--gb);
  font-family:"Kanit",inherit;font-size:15px;font-weight:500;
  color:var(--text);outline:none;transition:all .25s;appearance:none;
}
.fi::placeholder{color:var(--text3)}
.fi:focus{border-color:var(--gb-focus);box-shadow:0 0 0 4px rgba(var(--accent-rgb),.1);background:var(--bg-field-focus)}
.fi.err{border-color:rgba(255,69,58,.6)!important;box-shadow:0 0 0 3px rgba(255,69,58,.12)!important;animation:shake .35s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.tpw{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:4px;border-radius:8px;display:flex;align-items:center;transition:color .2s;
}
.tpw:hover{color:var(--text2)}
.tpw svg{width:16px;height:16px}

.ferr{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--red);
  padding:0 2px;max-height:0;overflow:hidden;opacity:0;
  transition:max-height .3s ease,opacity .25s ease,margin-top .25s ease;margin-top:0;
}
.ferr.show{max-height:40px;opacity:1;margin-top:6px}
.ferr svg{width:11px;height:11px;flex-shrink:0}

/* SUBMIT */
.sbtn{
  width:100%;margin-top:8px;padding:15px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:"Kanit",inherit;font-size:15px;font-weight:800;
  letter-spacing:.04em;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 6px 24px rgba(var(--accent-rgb),.38);transition:all .25s;
}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(var(--accent-rgb),.5)}
.sbtn:active{transform:scale(.97)}
.sbtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transition:left .5s}
.sbtn:hover::before{left:100%}
.sbtn.loading{pointer-events:none;opacity:.8}
.btxt,.bldr{display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .2s}
.bldr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8)}
.sbtn.loading .btxt{opacity:0;transform:scale(.8)}
.sbtn.loading .bldr{opacity:1;transform:scale(1)}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.bbck{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;margin-top:12px;padding:8px;
  background:none;border:none;font-family:"Kanit",inherit;
  font-size:12px;font-weight:600;letter-spacing:.06em;
  color:var(--text3);cursor:pointer;border-radius:10px;transition:all .2s;
}
.bbck:hover{color:var(--text2);background:rgba(var(--accent-rgb),.06)}
.bbck svg{width:12px;height:12px}

/* MODALS */
.movl{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
[data-theme="light"] .movl{background:rgba(80,80,100,.3)}
.movl.open{opacity:1;pointer-events:all}
.mbox{
  background:var(--modal-bg);border:1px solid var(--gb);border-radius:24px;
  padding:32px 28px;width:100%;max-width:340px;text-align:center;
  transform:scale(.88) translateY(20px);
  transition:transform .4s cubic-bezier(.34,1.3,.64,1),background .4s,border-color .4s;
  position:relative;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.3);
}
.movl.open .mbox{transform:scale(1) translateY(0)}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--panel-line),transparent)}

.mico{width:62px;height:62px;border-radius:20px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.mico.red{background:rgba(255,69,58,.12)}.mico.green{background:rgba(48,209,88,.12)}
.mico.red svg{color:var(--red)}.mico.green svg{color:var(--green)}
.mico svg{width:28px;height:28px}
.mtitle{font-size:18px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:8px;transition:color .4s}
.mdesc{font-size:12px;font-weight:400;color:var(--text2);line-height:1.75;margin-bottom:22px;white-space:pre-line;transition:color .4s}
.mbtn{width:100%;padding:13px;border-radius:14px;border:none;font-family:"Kanit",inherit;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.mbtn.red{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(255,69,58,.28)}
.mbtn.green{background:linear-gradient(135deg,var(--green),#00c06a);color:#fff;box-shadow:0 4px 16px rgba(48,209,88,.28)}
.mbtn:hover{transform:scale(1.02)}

/* PARTICLES */
#ptcls{position:fixed;inset:0;pointer-events:none;z-index:199}
.ptcl{position:absolute;border-radius:50%;animation:pfx 1.2s ease-out forwards}
@keyframes pfx{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

@keyframes logo-rise{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
#loginScene.fade-out{animation:sout .6s ease-in forwards}
@keyframes sout{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.04)}}

@media(max-width:440px){
  #formPanel{width:calc(100vw - 28px);padding:26px 18px 22px;border-radius:22px}
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-lines"></div>

<!-- THEME TOGGLE -->
<button id="themeBtn" onclick="toggleTheme()" title="Chế độ sáng / tối">
  <svg id="themeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div id="loginScene">

  <!-- LOGO STAGE -->
  <div id="logoStage" onclick="revealForm()">
    <div class="logo-ring">
      <div class="logo-img-box">
        <img src="img/logo-removed1.png" alt="Song Anh"
             onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='block'">
        <span class="logo-fallback">SA</span>
      </div>
    </div>
    <div class="logo-text">
      <h1>Song Anh<br>Kids Coffee</h1>
      <p>Hệ thống tích điểm</p>
    </div>
    <div class="tap-hint">Nhấn để đăng nhập</div>
  </div>

  <!-- FORM PANEL -->
  <div id="formPanel" role="dialog" aria-modal="true">

    <div class="panel-head">
      <div class="panel-logo-box">
        <img src="img/logo-removed1.png" alt="Logo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="plf">SA</span>
      </div>
      <div class="panel-head-txt">
        <h2>Song Anh Kids</h2>
        <p>Xác thực quản trị viên</p>
      </div>
    </div>

    <div class="field">
      <label class="flabel" for="un">Tên đăng nhập</label>
      <div class="fwrap">
        <div class="fico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <input class="fi" type="text" id="un" placeholder="Nhập tên đăng nhập"
               autocomplete="username" oninput="clearE('un')">
      </div>
      <div class="ferr" id="fe-un">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="fem-un"></span>
      </div>
    </div>

    <div class="field">
      <label class="flabel" for="pw">Mật khẩu</label>
      <div class="fwrap">
        <div class="fico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <input class="fi" type="password" id="pw" placeholder="Nhập mật khẩu"
               autocomplete="current-password" oninput="clearE('pw')" style="padding-right:44px">
        <button class="tpw" type="button" onclick="togglePw()" title="Hiện/ẩn">
          <svg id="eyeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="ferr" id="fe-pw">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="fem-pw"></span>
      </div>
    </div>

    <button class="sbtn" id="loginBtn" onclick="handleLogin()">
      <div class="btxt">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Đăng nhập
      </div>
      <div class="bldr"><div class="spinner"></div>Đang xử lý…</div>
    </button>

    <button class="bbck" onclick="hideForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Quay lại
    </button>
  </div>
</div>

<!-- ERROR MODAL -->
<div class="movl" id="errModal">
  <div class="mbox">
    <div class="mico red">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="mtitle" id="errTitle">Lỗi đăng nhập</div>
    <div class="mdesc" id="errDesc">Thông tin không đúng</div>
    <button class="mbtn red" onclick="closeErr()">Thử lại</button>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="movl" id="okModal">
  <div class="mbox">
    <div class="mico green">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <div class="mtitle">Chào mừng trở lại!</div>
    <div class="mdesc">Đăng nhập thành công 🎉&#10;Đang chuyển vào hệ thống…</div>
    <button class="mbtn green" onclick="enterApp()">Vào hệ thống</button>
  </div>
</div>

<div id="ptcls"></div>

<script>
const CREDS={username:'admin',password:'123456'};
let formOn=false,pwOn=false,dark=true;

function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeIco').innerHTML=dark
    ?`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
    :`<circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
}

function revealForm(){
  if(formOn)return;formOn=true;
  const s=document.getElementById('logoStage');
  s.style.transition='all .45s cubic-bezier(.4,0,.2,1)';
  s.style.transform='translateY(-28px) scale(.84)';
  s.style.opacity='0';s.style.pointerEvents='none';
  setTimeout(()=>{
    s.style.display='none';
    document.getElementById('formPanel').classList.add('visible');
    setTimeout(()=>document.getElementById('un').focus(),120);
  },340);
}

function hideForm(){
  formOn=false;clearE('un');clearE('pw');
  document.getElementById('un').value='';document.getElementById('pw').value='';
  document.getElementById('formPanel').classList.remove('visible');
  const s=document.getElementById('logoStage');
  s.style.display='';s.style.opacity='0';s.style.transform='translateY(18px) scale(.9)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    s.style.transition='all .5s cubic-bezier(.34,1.3,.64,1)';
    s.style.opacity='1';s.style.transform='translateY(0) scale(1)';s.style.pointerEvents='';
  }));
}

function togglePw(){
  pwOn=!pwOn;
  document.getElementById('pw').type=pwOn?'text':'password';
  document.getElementById('eyeIco').innerHTML=pwOn
    ?`<line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>`
    :`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

function showE(f,msg){
  document.getElementById(f).classList.add('err');
  document.getElementById('fem-'+f).textContent=msg;
  document.getElementById('fe-'+f).classList.add('show');
}
function clearE(f){
  const el=document.getElementById(f);if(el)el.classList.remove('err');
  const ed=document.getElementById('fe-'+f);if(ed)ed.classList.remove('show');
}
function closeErr(){document.getElementById('errModal').classList.remove('open')}
function showModal(id){document.getElementById(id).classList.add('open')}

function handleLogin(){
  clearE('un');clearE('pw');
  const un=document.getElementById('un').value.trim();
  const pw=document.getElementById('pw').value;
  if(!un){showE('un','Vui lòng nhập tên đăng nhập');document.getElementById('un').focus();return}
  if(!pw){showE('pw','Vui lòng nhập mật khẩu');document.getElementById('pw').focus();return}
  const bu=un!==CREDS.username,bp=pw!==CREDS.password;
  if(bu&&!bp){
    showE('un','Tên đăng nhập không tồn tại');
    document.getElementById('errTitle').textContent='Sai tên đăng nhập';
    document.getElementById('errDesc').textContent=`Không tìm thấy tài khoản "${un}".\nHãy kiểm tra lại tên đăng nhập.`;
    setTimeout(()=>showModal('errModal'),120);return;
  }
  if(!bu&&bp){
    showE('pw','Mật khẩu không chính xác');
    document.getElementById('errTitle').textContent='Sai mật khẩu';
    document.getElementById('errDesc').textContent='Mật khẩu bạn nhập không đúng.\nVui lòng thử lại.';
    setTimeout(()=>showModal('errModal'),120);return;
  }
  if(bu&&bp){
    showE('un','Thông tin không đúng');showE('pw','Thông tin không đúng');
    document.getElementById('errTitle').textContent='Đăng nhập thất bại';
    document.getElementById('errDesc').textContent='Tên đăng nhập hoặc mật khẩu không chính xác.\nHãy kiểm tra lại và thử lại.';
    setTimeout(()=>showModal('errModal'),120);return;
  }
  const btn=document.getElementById('loginBtn');
  btn.classList.add('loading');
  setTimeout(()=>{btn.classList.remove('loading');spawnPtcls();showModal('okModal')},900);
}

function spawnPtcls(){
  const c=document.getElementById('ptcls');c.innerHTML='';
  const cols=['#7d7aff','#da8fff','#00c2ff','#ffd60a','#30d158','#ff6b6b','#ff9f0a'];
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<50;i++){
    const el=document.createElement('div');el.className='ptcl';
    const sz=6+Math.random()*12;
    const a=(Math.PI*2*i)/50,d=100+Math.random()*230;
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;
      background:${cols[i%cols.length]};
      --dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;
      animation-delay:${Math.random()*.18}s;animation-duration:${.8+Math.random()*.7}s;opacity:.9`;
    c.appendChild(el);
  }
  setTimeout(()=>{c.innerHTML=''},2400);
}

function enterApp(){
  document.getElementById('okModal').classList.remove('open');
  document.getElementById('loginScene').classList.add('fade-out');
  setTimeout(()=>{window.location.href='index.html'},600);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&formOn)handleLogin();
  if(e.key==='Escape'){
    if(document.getElementById('errModal').classList.contains('open'))closeErr();
    else if(formOn)hideForm();
  }
});
document.getElementById('errModal').addEventListener('click',function(e){if(e.target===this)closeErr()});
</script>
</body>
</html>
