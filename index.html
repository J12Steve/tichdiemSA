<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playground Loyalty Ultimate - Hphuclam Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#8b5cf6' } } }
        }
    </script>

    <style>
        body { 
            font-family: "Josefin Sans", sans-serif; 
            margin: 0;
            padding: 0;
            /* Ngăn chặn kéo lò xo trên iOS */
            overscroll-behavior-y: none; 
        }

        /* Fix lỗi 100vh trên Mobile Chrome/Safari */
        .full-h {
            height: 100vh;
            height: 100dvh; 
        }
        
        .bg-light-theme {
            background: radial-gradient(ellipse 85% 65% at 8% 8%, rgba(175, 109, 255, 0.4), transparent 60%),
                        radial-gradient(ellipse 70% 60% at 15% 80%, rgba(255, 100, 180, 0.4), transparent 62%),
                        linear-gradient(180deg, #f8f0ff 0%, #fff0f5 100%);
        }
        .bg-dark-theme {
            background: radial-gradient(ellipse 110% 70% at 25% 80%, rgba(146, 51, 234, 0.3), transparent 55%),
                        radial-gradient(ellipse 130% 60% at 75% 15%, rgba(59, 131, 246, 0.3), transparent 65%),
                        #000000;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .dark .glass-card {
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes birthday-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
        .birthday-card {
            background: linear-gradient(135deg, #fff9c4 0%, #fffde7 100%) !important;
            border: 2px solid #fbc02d !important;
            animation: birthday-pulse 2s infinite;
        }
        .dark .birthday-card {
            background: linear-gradient(135deg, rgba(251, 192, 45, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%) !important;
            border: 2px solid rgba(251, 192, 45, 0.5) !important;
        }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
    </style>
</head>
<body class="transition-colors duration-500 overflow-hidden">

    <div id="app-container" class="full-h w-full relative flex flex-col bg-light-theme transition-all duration-500">
        
        <header class="relative z-30 px-4 py-4 md:px-6 md:py-6 max-w-7xl mx-auto w-full flex-none">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="text-center sm:text-left">
                    <h1 class="text-3xl md:text-4xl font-black tracking-tighter text-gray-900 dark:text-white">PLAYGROUND</h1>
                    <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-purple-600 dark:text-purple-400">Premium Loyalty System</p>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="relative group">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="searchInput" placeholder="Tìm tên, sđt..." 
                            class="w-32 md:w-64 pl-9 pr-4 py-2 rounded-2xl bg-white/80 dark:bg-white/10 border border-white/50 dark:border-white/10 outline-none focus:ring-2 focus:ring-purple-500 text-sm font-medium text-gray-900 dark:text-white transition-all">
                    </div>
                    <button onclick="toggleTheme()" class="p-2 rounded-2xl bg-white/80 dark:bg-white/10 border border-white/50 shadow-sm transition-all">
                        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-gray-800 dark:text-yellow-400"></i>
                    </button>
                    <button onclick="openModal()" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-2 rounded-2xl font-bold text-xs flex items-center gap-1 shadow-lg active:scale-95 transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i> Thêm
                    </button>
                </div>
            </div>

            <div class="mt-4 flex justify-center">
                <div class="glass-card p-1 rounded-2xl flex gap-1 shadow-inner scale-90 sm:scale-100">
                    <button onclick="switchView('cards')" id="btnViewCards" class="px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all bg-gray-900 text-white dark:bg-white dark:text-gray-900 shadow-md">CARDS</button>
                    <button onclick="switchView('table')" id="btnViewTable" class="px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all text-gray-500 dark:text-gray-400">LIST</button>
                </div>
            </div>
        </header>

        <main class="flex-grow overflow-hidden relative px-4 md:px-6 max-w-7xl mx-auto w-full">
            <div id="viewCards" class="h-full overflow-y-auto custom-scroll pb-10">
                <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>

            <div id="viewTable" class="hidden h-full flex flex-col pb-10">
                <div class="glass-card rounded-[2rem] flex flex-col h-full overflow-hidden border-none shadow-xl">
                    <div class="overflow-y-auto custom-scroll w-full">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 z-10 bg-white/90 dark:bg-black/80 backdrop-blur-xl border-b border-black/5 dark:border-white/10">
                                <tr class="text-[10px] uppercase tracking-widest font-black text-gray-500">
                                    <th class="px-4 py-4">Bé yêu</th>
                                    <th class="px-4 py-4 hidden sm:table-cell">Phụ huynh</th>
                                    <th class="px-4 py-4">SĐT</th>
                                    <th class="px-4 py-4">Điểm</th>
                                    <th class="px-4 py-4 text-right">#</th>
                                </tr>
                            </thead>
                            <tbody id="memberTableBody" class="divide-y divide-black/5 dark:divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="flex-none relative z-30 py-4 w-full flex justify-center items-center border-t border-black/5 dark:border-white/5 bg-white/20 dark:bg-black/20 backdrop-blur-sm">
            <div class="flex items-center gap-2 opacity-80">
                <span class="text-[8px] font-black uppercase tracking-[0.5em] text-gray-700 dark:text-gray-300">Crafted by</span>
                <span class="text-[12px] font-black text-purple-700 dark:text-white">Hphuclam</span>
                <div class="w-1.5 h-1.5 rounded-full bg-purple-600 animate-pulse"></div>
            </div>
        </footer>

        <div id="modalOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm hidden opacity-0 transition-all duration-300 px-4">
            <div id="modalContent" class="glass-card p-6 rounded-[2.5rem] w-full max-w-md shadow-2xl scale-95 transition-all">
                <h2 id="modalTitle" class="text-xl font-black mb-5 text-gray-900 dark:text-white tracking-tight text-center">Đăng Ký Thành Viên</h2>
                <form id="memberForm" class="space-y-3">
                    <input type="hidden" id="editId">
                    <input type="text" id="kidName" placeholder="Tên bé yêu" required class="w-full px-4 py-3.5 rounded-2xl bg-white dark:bg-black/20 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="dadName" placeholder="Tên Cha" class="w-full px-4 py-3.5 rounded-2xl bg-white dark:bg-black/20 border border-gray-200 text-sm outline-none">
                        <input type="text" id="momName" placeholder="Tên Mẹ" class="w-full px-4 py-3.5 rounded-2xl bg-white dark:bg-black/20 border border-gray-200 text-sm outline-none">
                    </div>
                    <input type="tel" id="phone" placeholder="Số điện thoại" required class="w-full px-4 py-3.5 rounded-2xl bg-white dark:bg-black/20 border border-gray-200 text-sm outline-none">
                    <input type="date" id="dob" class="w-full px-4 py-3.5 rounded-2xl bg-white dark:bg-black/20 border border-gray-200 text-sm outline-none uppercase">
                    <div class="flex gap-3 pt-3">
                        <button type="button" onclick="closeModal()" class="flex-1 font-bold text-gray-500 text-sm">Hủy</button>
                        <button type="submit" class="flex-[2] py-3.5 bg-purple-600 text-white rounded-2xl font-black shadow-lg text-sm">Lưu Thông Tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let members = JSON.parse(localStorage.getItem('playground_members')) || [];
        let isDarkMode = false;
        const today = new Date();

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark');
            const container = document.getElementById('app-container');
            const icon = document.getElementById('themeIcon');
            if (isDarkMode) {
                container.classList.replace('bg-light-theme', 'bg-dark-theme');
                icon.setAttribute('data-lucide', 'sun');
            } else {
                container.classList.replace('bg-dark-theme', 'bg-light-theme');
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        function switchView(view) {
            const vCards = document.getElementById('viewCards');
            const vTable = document.getElementById('viewTable');
            const btnC = document.getElementById('btnViewCards');
            const btnT = document.getElementById('btnViewTable');
            const active = "bg-gray-900 text-white dark:bg-white dark:text-gray-900 shadow-md";
            const inactive = "text-gray-500 dark:text-gray-400";

            if (view === 'cards') {
                vCards.classList.remove('hidden'); vTable.classList.add('hidden');
                btnC.className = `px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all ${active}`;
                btnT.className = `px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all ${inactive}`;
            } else {
                vTable.classList.remove('hidden'); vCards.classList.add('hidden');
                btnT.className = `px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all ${active}`;
                btnC.className = `px-6 md:px-10 py-2 rounded-xl text-[10px] font-black transition-all ${inactive}`;
            }
        }

        function openModal(id = null) {
            const m = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('memberForm');
            
            if (id) {
                const data = members.find(x => x.id === id);
                title.innerText = "Sửa Thông Tin";
                document.getElementById('editId').value = data.id;
                document.getElementById('kidName').value = data.kidName;
                document.getElementById('dadName').value = data.dadName || '';
                document.getElementById('momName').value = data.momName || '';
                document.getElementById('phone').value = data.phone;
                document.getElementById('dob').value = data.dob || '';
            } else {
                title.innerText = "Đăng Ký Thành Viên";
                form.reset();
                document.getElementById('editId').value = '';
            }

            m.classList.remove('hidden');
            setTimeout(() => { m.classList.add('opacity-100'); document.getElementById('modalContent').classList.remove('scale-95'); }, 10);
        }

        function closeModal() {
            const m = document.getElementById('modalOverlay');
            m.classList.remove('opacity-100');
            document.getElementById('modalContent').classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        document.getElementById('memberForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const newData = {
                id: id ? parseInt(id) : Date.now(),
                kidName: document.getElementById('kidName').value,
                dadName: document.getElementById('dadName').value,
                momName: document.getElementById('momName').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value,
                points: id ? members.find(x => x.id == id).points : 0
            };

            if (id) {
                members = members.map(m => m.id == id ? newData : m);
            } else {
                members.push(newData);
            }

            localStorage.setItem('playground_members', JSON.stringify(members));
            render(); closeModal();
        };

        function addPoint(id) {
            const m = members.find(x => x.id === id);
            if (m && m.points < 10) {
                m.points++;
                if (m.points === 10) { 
                    alert(`🎉 CHÚC MỪNG BÉ ${m.kidName.toUpperCase()}!\nNhận ngay 1 vé MIỄN PHÍ!`); 
                    m.points = 0; 
                }
                localStorage.setItem('playground_members', JSON.stringify(members));
                render();
            }
        }

        function deleteMember(id) {
            if(confirm('Xóa thông tin bé?')) {
                members = members.filter(m => m.id !== id);
                localStorage.setItem('playground_members', JSON.stringify(members));
                render();
            }
        }

        async function captureCard(id) {
            const el = document.getElementById(`card-${id}`);
            const actions = el.querySelectorAll('.action-btn');
            actions.forEach(b => b.style.opacity = '0');
            
            const canvas = await html2canvas(el, {
                backgroundColor: isDarkMode ? '#1a1a1a' : '#ffffff',
                borderRadius: 40,
                scale: 2
            });
            
            const link = document.createElement('a');
            link.download = `The-${id}.png`;
            link.href = canvas.toDataURL();
            link.click();
            actions.forEach(b => b.style.opacity = '1');
        }

        function getAgeDisplay(dob) {
            if (!dob) return "N/A";
            const b = new Date(dob);
            let age = today.getFullYear() - b.getFullYear();
            const m = today.getMonth() - b.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
            return age < 1 ? "Dưới 1 tuổi" : age + " tuổi";
        }

        document.getElementById('searchInput').oninput = (e) => render(e.target.value.toLowerCase());

        function render(f = '') {
            const filtered = members.filter(m => m.kidName.toLowerCase().includes(f) || m.phone.includes(f));

            // CARDS
            document.getElementById('cardsGrid').innerHTML = filtered.map(m => {
                const dob = new Date(m.dob);
                const isBday = m.dob && dob.getDate() === today.getDate() && dob.getMonth() === today.getMonth();
                return `
                    <div id="card-${m.id}" class="glass-card p-6 rounded-[2.5rem] relative transition-all duration-300 ${isBday ? 'birthday-card' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-black text-gray-950 dark:text-white">${m.kidName} ${isBday ? '🎂' : ''}</h3>
                                <p class="text-[9px] font-black uppercase tracking-widest ${isBday ? 'text-amber-700' : 'text-purple-600 dark:text-purple-400'} mt-1">
                                    ${isBday ? 'Sinh nhật hôm nay!' : getAgeDisplay(m.dob)}
                                </p>
                            </div>
                            <div class="flex gap-1 action-btn">
                                <button onclick="captureCard(${m.id})" class="p-2 text-gray-400 hover:text-blue-500"><i data-lucide="download" class="w-4 h-4"></i></button>
                                <button onclick="openModal(${m.id})" class="p-2 text-gray-400 hover:text-purple-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteMember(${m.id})" class="p-2 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="mb-4 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase italic">
                            Bố: ${m.dadName || '...'} | Mẹ: ${m.momName || '...'}
                        </div>
                        <div class="grid grid-cols-5 gap-3 mb-6 bg-white/30 dark:bg-black/20 p-4 rounded-3xl shadow-inner">
                            ${Array.from({length: 10}).map((_, i) => `
                                <div onclick="addPoint(${m.id})" class="aspect-square rounded-full border-2 flex items-center justify-center transition-all cursor-pointer
                                    ${i < m.points ? (isBday ? 'bg-amber-500 border-amber-500' : 'bg-purple-600 border-purple-600') : 'border-gray-200 dark:border-white/10 hover:border-purple-300'}">
                                    ${i < m.points ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex items-center justify-between border-t border-black/5 dark:border-white/5 pt-4">
                            <div class="flex items-center gap-2 text-gray-950 dark:text-gray-200">
                                <i data-lucide="phone" class="w-3 h-3 text-purple-600"></i>
                                <span class="text-xs font-black tracking-widest">${m.phone}</span>
                            </div>
                            <span class="text-[8px] font-bold text-gray-400 uppercase">ID: ${m.id.toString().slice(-4)}</span>
                        </div>
                    </div>
                `;
            }).join('');

            // TABLE
            document.getElementById('memberTableBody').innerHTML = filtered.map(m => {
                const dob = new Date(m.dob);
                const isBday = m.dob && dob.getDate() === today.getDate() && dob.getMonth() === today.getMonth();
                const rowClass = isBday ? 'bg-amber-50 dark:bg-amber-900/20' : 'hover:bg-white/50 dark:hover:bg-white/5';
                const textClass = isBday ? 'text-amber-700 font-black' : 'text-gray-900 dark:text-gray-200';

                return `
                    <tr class="transition-all ${rowClass} ${textClass}">
                        <td class="px-4 py-4">
                            <div class="font-black text-sm">${m.kidName} ${isBday ? '🎂' : ''}</div>
                            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">${getAgeDisplay(m.dob)}</div>
                        </td>
                        <td class="px-4 py-4 hidden sm:table-cell text-[10px] font-medium text-gray-500">
                            B: ${m.dadName || '-'}<br>M: ${m.momName || '-'}
                        </td>
                        <td class="px-4 py-4 text-xs font-black tracking-widest ${isBday ? 'text-amber-700' : 'text-purple-700 dark:text-purple-400'}">${m.phone}</td>
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-1.5">
                                <div class="w-12 h-1 bg-gray-200 dark:bg-white/10 rounded-full overflow-hidden">
                                    <div class="h-full ${isBday ? 'bg-amber-500' : 'bg-purple-600'}" style="width: ${m.points * 10}%"></div>
                                </div>
                                <span class="text-[9px] font-black">${m.points}/10</span>
                            </div>
                        </td>
                        <td class="px-4 py-4 text-right flex justify-end gap-0.5">
                            <button onclick="addPoint(${m.id})" class="p-1.5 text-purple-600"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                            <button onclick="openModal(${m.id})" class="p-1.5 text-gray-500"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button onclick="deleteMember(${m.id})" class="p-1.5 text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
