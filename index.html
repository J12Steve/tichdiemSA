        });

        // Section headers (row 7)
        sc2('A7', { font:{bold:true,sz:11,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:C.green}}, alignment:{horizontal:'center',vertical:'center'}, border });
        sc2('B7', { fill:{patternType:'solid',fgColor:{rgb:C.green}}, border });
        sc2('C7', { font:{bold:true,sz:11,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:C.brandMid}}, alignment:{horizontal:'center',vertical:'center'}, border });
        ['D7','E7','F7'].forEach(r => sc2(r, { fill:{patternType:'solid',fgColor:{rgb:C.brandMid}}, border }));

        // Sub-headers (row 8)
        sc2('A8', { font:{bold:true,sz:10,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:'388E3C'}}, alignment:{horizontal:'center'}, border });
        sc2('B8', { font:{bold:true,sz:10,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:'388E3C'}}, alignment:{horizontal:'center'}, border });
        ['C8','D8','E8','F8'].forEach(r => sc2(r, { font:{bold:true,sz:10,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:'1565C0'}}, alignment:{horizontal:'center'}, border }));

        // Distribution data rows
        for (let i = 0; i <= 10; i++) {
            const r = 9 + i;
            const pct = members.length > 0 ? dist[i] / members.length : 0;
            let barBg = C.gray;
            if (i >= 9) barBg = 'FFCCBC';
            else if (i >= 7) barBg = C.greenLight;
            else if (i >= 5) barBg = C.accentLight;

            sc2(`A${r}`, { font:{sz:11,bold:true,color:{rgb:C.textDark}}, fill:{patternType:'solid',fgColor:{rgb:barBg}}, alignment:{horizontal:'center'}, border });
            sc2(`B${r}`, { font:{sz:11,bold:true,color:{rgb:dist[i]>0?C.brandMid:'9E9E9E'}}, fill:{patternType:'solid',fgColor:{rgb:barBg}}, alignment:{horizontal:'center'}, border });

            // Top members
            const top = topMembers[i];
            if (top) {
                const rankBg = i === 0 ? 'FFF9C4' : i === 1 ? 'F5F5F5' : i === 2 ? 'FBE9E7' : C.white;
                sc2(`C${r}`, { font:{bold:true,sz:10,color:{rgb:i<3?C.amber:C.textMid}}, fill:{patternType:'solid',fgColor:{rgb:rankBg}}, alignment:{horizontal:'center'}, border });
                sc2(`D${r}`, { font:{bold:i===0,sz:11,color:{rgb:C.textDark}}, fill:{patternType:'solid',fgColor:{rgb:rankBg}}, alignment:{horizontal:'left'}, border });
                sc2(`E${r}`, { font:{bold:true,sz:12,color:{rgb:top.points>=8?C.green:C.accent}}, fill:{patternType:'solid',fgColor:{rgb:rankBg}}, alignment:{horizontal:'center'}, border });
                sc2(`F${r}`, { font:{sz:10,color:{rgb:C.accent}}, fill:{patternType:'solid',fgColor:{rgb:rankBg}}, alignment:{horizontal:'center'}, border });
            }
        }

        XLSX.utils.book_append_sheet(wb, ws2, '📊 Thống kê');

        // ──────────────────────────────────────────────
        // SHEET 3: HƯỚNG DẪN
        // ──────────────────────────────────────────────
        const guideRows = [
            ['📖 HƯỚNG DẪN SỬ DỤNG FILE EXCEL', '', '', ''],
            [''],
            ['Cột', 'Mô tả', 'Bắt buộc', 'Ví dụ'],
            ['Họ tên bé', 'Họ và tên đầy đủ của bé', '✅ Có', 'Nguyễn Văn An'],
            ['Tên Bố', 'Họ tên của bố (có thể bỏ trống)', '❌ Không', 'Nguyễn Văn Bình'],
            ['Tên Mẹ', 'Họ tên của mẹ (có thể bỏ trống)', '❌ Không', 'Trần Thị Cẩm'],
            ['Số điện thoại', 'Số điện thoại 10 chữ số, bắt đầu bằng 0', '✅ Có', '0912345678'],
            ['Ngày sinh', 'Định dạng: YYYY-MM-DD', '❌ Không', '2019-06-15'],
            ['Điểm tích lũy', 'Số nguyên từ 0 đến 10', '❌ Không', '5'],
            [''],
            ['⚠️ LƯU Ý KHI NHẬP LẠI', '', '', ''],
            ['• Không thay đổi tên các cột (hàng đầu tiên)', '', '', ''],
            ['• Số điện thoại: đúng 10 số, bắt đầu bằng 0', '', '', ''],
            ['• Ngày sinh: định dạng YYYY-MM-DD (ví dụ: 2020-03-25)', '', '', ''],
            ['• Điểm: số từ 0 đến 10, để trống = 0 điểm', '', '', ''],
        ];
        const ws3 = XLSX.utils.aoa_to_sheet(guideRows);
        ws3['!cols'] = [{ wch: 26 }, { wch: 44 }, { wch: 14 }, { wch: 22 }];
        ws3['!merges'] = [
            { s:{r:0,c:0}, e:{r:0,c:3} },
            { s:{r:10,c:0}, e:{r:10,c:3} },
        ];
        function sc3(ref, style) {
            if (!ws3[ref]) ws3[ref] = { v:'', t:'s' };
            ws3[ref].s = style;
        }
        sc3('A1', { font:{bold:true,sz:15,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:C.brandDark}}, alignment:{horizontal:'center',vertical:'center'} });
        ['B1','C1','D1'].forEach(r => sc3(r, { fill:{patternType:'solid',fgColor:{rgb:C.brandDark}} }));
        ['A3','B3','C3','D3'].forEach(r => sc3(r, { font:{bold:true,sz:10,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:C.brandMid}}, alignment:{horizontal:'center'}, border }));
        for (let i = 3; i <= 8; i++) {
            const r = i + 1;
            const bg = i % 2 === 0 ? C.brandLight : C.white;
            ['A','B','C','D'].forEach(col => sc3(col+r, { font:{sz:10,color:{rgb:C.textDark},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:bg}}, alignment:{horizontal:'left',vertical:'center'}, border }));
            sc3('C'+r, { font:{sz:11,bold:true,color:{rgb:i===3||i===5?C.green:C.red},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:bg}}, alignment:{horizontal:'center'}, border });
        }
        sc3('A11', { font:{bold:true,sz:11,color:{rgb:C.white},name:'Calibri'}, fill:{patternType:'solid',fgColor:{rgb:C.orange}}, alignment:{horizontal:'center',vertical:'center'} });
        ['B11','C11','D11'].forEach(r => sc3(r, { fill:{patternType:'solid',fgColor:{rgb:C.orange}} }));

        XLSX.utils.book_append_sheet(wb, ws3, '📖 Hướng dẫn');

        // ── WRITE FILE ──
        XLSX.writeFile(wb, `SongAnh-ThanhVien-${exportDateISO}.xlsx`);
        showNotification('success', '✅ Xuất thành công!', `Đã xuất ${members.length} thành viên ra file Excel với 3 sheet: Danh sách, Thống kê và Hướng dẫn.`);
    }

    // ─────────────────────────────────────────────
    // ── IMPORT EXCEL ──────────────────────────────
    // ─────────────────────────────────────────────
    let importMode = 'merge';
    let pendingImportData = [];

    function setImportMode(mode) {
        importMode = mode;
        document.getElementById('modeMergeBtn').classList.toggle('active', mode === 'merge');
        document.getElementById('modeReplaceBtn').classList.toggle('active', mode === 'replace');
        updateImportSummary();
    }

    function resetImportFile() {
        document.getElementById('importFileInput').value = '';
        pendingImportData = [];
    }

    function updateImportSummary() {
        const total = pendingImportData.length;
        const valid = pendingImportData.filter(r => r._valid).length;
        const invalid = total - valid;
        let txt = '';
        if (importMode === 'merge') {
            txt = `Gộp thêm <span class="badge green">${valid} hợp lệ</span>`;
            if (invalid > 0) txt += ` <span class="badge red">${invalid} lỗi (bỏ qua)</span>`;
            txt += ` vào ${members.length} thành viên hiện có`;
        } else {
            txt = `Ghi đè toàn bộ bằng <span class="badge green">${valid} hợp lệ</span>`;
            if (invalid > 0) txt += ` <span class="badge red">${invalid} lỗi (bỏ qua)</span>`;
            txt += ` — xóa ${members.length} thành viên cũ`;
        }
        document.getElementById('importSummary').innerHTML = txt;
    }

    function handleImportFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array', cellDates: true });
                const sheetName = wb.SheetNames[0];
                const ws = wb.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                if (rows.length < 2) {
                    showNotification('error', '❌ File rỗng', 'File Excel không có dữ liệu hoặc thiếu header.');
                    resetImportFile(); return;
                }

                // Find header row (skip title rows)
                let headerRowIdx = 0;
                for (let i = 0; i < Math.min(rows.length, 8); i++) {
                    const r = rows[i].map(h => String(h).toLowerCase().trim());
                    if (r.some(h => h.includes('tên bé') || h.includes('ten be') || h.includes('họ tên') || h.includes('phone') || h.includes('điện thoại'))) {
                        headerRowIdx = i; break;
                    }
                }

                const headerRow = rows[headerRowIdx].map(h => String(h).toLowerCase().trim());
                const findCol = (...keywords) => {
                    for (const kw of keywords) {
                        const idx = headerRow.findIndex(h => h.includes(kw));
                        if (idx !== -1) return idx;
                    }
                    return -1;
                };

                const colKid   = findCol('tên bé', 'ten be', 'họ tên', 'ho ten', 'tên');
                const colDad   = findCol('bố', 'bo', 'dad', 'father', 'cha');
                const colMom   = findCol('mẹ', 'me', 'mom', 'mother');
                const colPhone = findCol('điện thoại', 'dien thoai', 'phone', 'sdt', 'liên hệ');
                const colDob   = findCol('ngày sinh', 'ngay sinh', 'dob', 'birth');
                const colPts   = findCol('điểm', 'diem', 'points', 'tích lũy');

                if (colKid === -1 || colPhone === -1) {
                    showNotification('error', '❌ Sai định dạng', 'File thiếu cột "Tên bé" hoặc "Số điện thoại".');
                    resetImportFile(); return;
                }

                pendingImportData = rows.slice(headerRowIdx + 1).map((row, idx) => {
                    const kidName  = String(row[colKid]   || '').trim();
                    const dadName  = colDad  >= 0 ? String(row[colDad]  || '').trim() : '';
                    const momName  = colMom  >= 0 ? String(row[colMom]  || '').trim() : '';
                    const phone    = String(row[colPhone] || '').replace(/\D/g,'');
                    let   dob      = '';
                    if (colDob >= 0 && row[colDob]) {
                        const raw = row[colDob];
                        if (raw instanceof Date) dob = raw.toISOString().slice(0,10);
                        else {
                            const s = String(raw).trim();
                            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) dob = s;
                            else if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d,m,y] = s.split('/'); dob = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
                            else if (/^\d{8}$/.test(s)) dob = `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
                        }
                    }
                    const rawPts = colPts >= 0 ? row[colPts] : '';
                    const points = Math.min(10, Math.max(0, parseInt(rawPts) || 0));
                    const errors = [];
                    if (!kidName || kidName.length < 2) errors.push('Thiếu tên bé');
                    if (!phone || phone.length !== 10 || !phone.startsWith('0')) errors.push('SĐT không hợp lệ');
                    if (dob && new Date(dob) > today) errors.push('Ngày sinh tương lai');
                    const id = Date.now() + idx + Math.random() * 100 | 0;
                    return { id, kidName, dadName, momName, phone, dob, points, _valid: errors.length === 0, _errors: errors };
                }).filter(r => r.kidName || r.phone);

                if (pendingImportData.length === 0) {
                    showNotification('error', '❌ Không có dữ liệu', 'File không có dòng dữ liệu nào.');
                    resetImportFile(); return;
                }

                let previewHtml = `<table><thead><tr><th>Tên bé</th><th>Bố</th><th>Mẹ</th><th>SĐT</th><th>Ngày sinh</th><th>Điểm</th><th>Trạng thái</th></tr></thead><tbody>`;
                pendingImportData.slice(0, 50).forEach(r => {
                    const status = r._valid ? `<span class="badge green">✓ OK</span>` : `<span class="badge red" title="${r._errors.join(', ')}">✗ Lỗi</span>`;
                    previewHtml += `<tr style="${!r._valid ? 'opacity:0.5' : ''}"><td class="td-name">${r.kidName || '—'}</td><td class="td-parents">${r.dadName || '—'}</td><td class="td-parents">${r.momName || '—'}</td><td class="td-phone">${r.phone || '—'}</td><td class="td-parents">${r.dob || '—'}</td><td class="td-parents">${r.points}</td><td>${status}</td></tr>`;
                });
                if (pendingImportData.length > 50) previewHtml += `<tr><td colspan="7" style="text-align:center;padding:10px;color:var(--text3);font-size:11px;">... và ${pendingImportData.length - 50} dòng nữa</td></tr>`;
                previewHtml += '</tbody></table>';

                document.getElementById('importPreview').innerHTML = previewHtml;
                updateImportSummary();
                showModal('importModal');
            } catch (err) {
                showNotification('error', '❌ Đọc file thất bại', 'Không thể đọc file Excel. Hãy kiểm tra định dạng file.');
                resetImportFile();
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function confirmImport() {
        const validData = pendingImportData.filter(r => r._valid).map(r => ({
            id: r.id, kidName: r.kidName, dadName: r.dadName,
            momName: r.momName, phone: r.phone, dob: r.dob, points: r.points
        }));
        if (validData.length === 0) { showNotification('error', '❌ Không có dữ liệu hợp lệ', 'Tất cả các dòng đều bị lỗi.'); return; }
        if (importMode === 'replace') members = validData;
        else { validData.forEach(newM => { const idx = members.findIndex(m => m.id === newM.id); if (idx >= 0) members[idx] = newM; else members.push(newM); }); }
        localStorage.setItem('playground_members', JSON.stringify(members));
        render(searchInput.value.toLowerCase());
        closeModal('importModal'); resetImportFile();
        showNotification('success', '✅ Nhập thành công!', `${importMode === 'replace' ? 'Ghi đè' : 'Gộp thêm'}: ${validData.length} thành viên đã được lưu.`);
    }

    // ── RENDER ─────────────────────────────────────
    function render(f = '') {
        const list = members.filter(m =>
            m.kidName.toLowerCase().includes(f) || m.phone.includes(f)
        );

        document.getElementById('cardsGrid').innerHTML = list.map((m, idx) => {
            const bday = isBirthday(m.dob);
            const delay = Math.min(idx * 60, 400);
            return `
            <div id="card-${m.id}" class="member-card ${bday ? 'birthday-card' : ''}" style="animation-delay:${delay}ms">
                <div class="card-top">
                    <div>
                        <div class="card-name">${m.kidName}${bday ? ' 🎂' : ''}</div>
                        <div class="card-sub ${bday ? 'bday-sub' : ''}">${bday ? 'Sinh nhật hôm nay!' : getAge(m.dob)}</div>
                    </div>
                    <div class="card-actions">
                        <button class="card-act-btn dl" onclick="captureCard(${m.id})" title="Tải">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                        <button class="card-act-btn edit" onclick="openModal(${m.id})" title="Sửa">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="card-act-btn del" onclick="deleteMember(${m.id})" title="Xóa">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        </button>
                    </div>
                </div>
                <div class="card-parents">Bố: ${m.dadName || '—'} &nbsp;|&nbsp; Mẹ: ${m.momName || '—'}</div>
                <div class="dots-grid">
                    ${Array.from({length:10},(_,i) => `
                        <div class="dot ${i < m.points ? (bday ? 'filled bday-dot' : 'filled') : ''}" onclick="tichdiem(${m.id})">
                            ${i < m.points ? `<img src="img/logo-removed.png" alt="">` : ''}
                        </div>
                    `).join('')}
                </div>
                <div class="card-footer">
                    <div class="card-phone">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38A2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.87-.87a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        ${m.phone}
                    </div>
                    <span class="card-id">ID·${m.id.toString().slice(-4)}</span>
                </div>
            </div>`;
        }).join('');

        document.getElementById('memberTableBody').innerHTML = list.map((m, idx) => {
            const bday = isBirthday(m.dob);
            const delay = Math.min(idx * 40, 300);
            return `
            <tr style="${bday ? 'background:rgba(255,159,10,0.08)' : ''}; animation-delay:${delay}ms">
                <td>
                    <div class="td-name">${m.kidName}${bday ? ' 🎂' : ''}</div>
                    <div class="td-age" style="${bday ? 'color:var(--amber)' : ''}">${bday ? 'Hôm nay sinh nhật!' : getAge(m.dob)}</div>
                </td>
                <td><div class="td-parents">Bố: ${m.dadName || '—'}<br>Mẹ: ${m.momName || '—'}</div></td>
                <td><span class="td-phone">${m.phone}</span></td>
                <td>
                    <div class="progress-bar">
                        <div class="progress-track">
                            <div class="progress-fill ${bday ? 'bday' : ''}" style="width:${m.points*10}%"></div>
                        </div>
                        <span class="progress-label">${m.points}/10</span>
                    </div>
                </td>
                <td>
                    <div class="td-actions">
                        <button class="tbl-act-btn plus" onclick="tichdiem(${m.id})" title="Tích điểm">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                        </button>
                        <button class="tbl-act-btn" onclick="openModal(${m.id})" title="Sửa">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="tbl-act-btn del" onclick="deleteMember(${m.id})" title="Xóa">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    render();
</script>
</body>
</html>
